<style>

/* ==========================================================
   TKR ENGINE V2
   UI Framework v0.1 Alpha
   Sprint UI-2 Part 1
   ========================================================== */


/* ==========================================================
   RESET
   ========================================================== */

*,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


/* ==========================================================
   ROOT VARIABLES
   ========================================================== */

:root{

    /* Primary Color */

    --primary:#2563eb;
    --primary-dark:#1d4ed8;

    /* Status */

    --success:#16a34a;
    --warning:#f59e0b;
    --danger:#dc2626;
    --info:#0ea5e9;

    /* Neutral */

    --background:#f3f4f6;
    --surface:#ffffff;

    --sidebar:#1e293b;
    --sidebar-hover:#334155;

    --header:#ffffff;

    --text:#111827;

    --text-light:#6b7280;

    --border:#e5e7eb;

    /* Shadow */

    --shadow:

        0 8px 20px rgba(0,0,0,.08);

    /* Radius */

    --radius:12px;

    /* Animation */

    --transition:.25s ease;

}


/* ==========================================================
   DARK MODE
   ========================================================== */

body.dark{

    --background:#0f172a;

    --surface:#1e293b;

    --header:#1e293b;

    --sidebar:#020617;

    --sidebar-hover:#1e293b;

    --text:#f8fafc;

    --text-light:#cbd5e1;

    --border:#334155;

}


/* ==========================================================
   HTML
   ========================================================== */

html{

    height:100%;

    scroll-behavior:smooth;

}


/* ==========================================================
   BODY
   ========================================================== */

body{

    height:100vh;

    background:var(--background);

    color:var(--text);

    font-family:

        "Segoe UI",

        Arial,

        sans-serif;

    overflow:hidden;

}


/* ==========================================================
   APP
   ========================================================== */

#app{

    height:100vh;

    display:grid;

    grid-template-rows:

        60px

        1fr

        40px;

}


/* ==========================================================
   LAYOUT
   ========================================================== */

#layout{

    display:grid;

    grid-template-columns:

        260px

        1fr;

    overflow:hidden;

}


/* ==========================================================
   HEADER
   ========================================================== */

#app-header{

    background:var(--header);

    border-bottom:

        1px solid

        var(--border);

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:

        0 24px;

    box-shadow:

        var(--shadow);

    z-index:20;

}


/* ==========================================================
   BRAND
   ========================================================== */

.brand{

    font-size:20px;

    font-weight:700;

}


/* ==========================================================
   HEADER ACTION
   ========================================================== */

.header-actions{

    display:flex;

    gap:12px;

}


/* ==========================================================
   BUTTON
   ========================================================== */

button{

    border:none;

    outline:none;

    cursor:pointer;

    transition:

        var(--transition);

}


/* ==========================================================
   ICON BUTTON
   ========================================================== */

#btnTheme,

#btnDebug{

    width:40px;

    height:40px;

    border-radius:50%;

    background:#f8fafc;

    font-size:18px;

}

#btnTheme:hover,

#btnDebug:hover{

    transform:translateY(-2px);

    box-shadow:

        var(--shadow);

}


/* ==========================================================
   SIDEBAR
   ========================================================== */

#sidebar{

    background:var(--sidebar);

    color:white;

    overflow-y:auto;

}


/* ==========================================================
   SIDEBAR HEADER
   ========================================================== */

.sidebar-header{

    padding:22px;

    font-size:13px;

    letter-spacing:2px;

    opacity:.6;

}


/* ==========================================================
   NAVIGATION
   ========================================================== */

#sidebar nav{

    display:flex;

    flex-direction:column;

}


/* ==========================================================
   NAV ITEM
   ========================================================== */

.nav-item{

    background:none;

    color:white;

    text-align:left;

    padding:

        16px

        22px;

    font-size:15px;

}

.nav-item:hover{

    background:

        var(--sidebar-hover);

}

.nav-item.active{

    background:

        var(--primary);

}


/* ==========================================================
   WORKSPACE
   ========================================================== */

#workspace{

    overflow:auto;

    padding:30px;

}


/* ==========================================================
   PAGE TITLE
   ========================================================== */

#workspace h1{

    font-size:30px;

    margin-bottom:20px;

}


/* ==========================================================
   CARD GRID
   ========================================================== */

.card-grid{

    display:grid;

    grid-template-columns:

        repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

}


/* ==========================================================
   CARD
   ========================================================== */

.card{

    background:var(--surface);

    border-radius:

        var(--radius);

    box-shadow:

        var(--shadow);

    padding:20px;

    border:

        1px solid

        var(--border);

}

.card h3{

    margin-bottom:12px;

}


/* ==========================================================
   STATUS
   ========================================================== */

.status{

    display:inline-block;

    padding:

        6px

        14px;

    border-radius:30px;

    color:white;

    font-size:13px;

    font-weight:600;

}

.ready{

    background:

        var(--success);

}


/* ==========================================================
   TABLE
   ========================================================== */

.table{

    width:100%;

    border-collapse:collapse;

    background:var(--surface);

    border-radius:

        var(--radius);

    overflow:hidden;

}

.table th{

    background:#f8fafc;

    text-align:left;

    padding:14px;

}

.table td{

    padding:14px;

    border-top:

        1px solid

        var(--border);

}


/* ==========================================================
   FOOTER
   ========================================================== */

#footer{

    display:flex;

    align-items:center;

    justify-content:center;

    border-top:

        1px solid

        var(--border);

    background:var(--header);

    font-size:13px;

}


/* ==========================================================
   SCROLLBAR
   ========================================================== */

::-webkit-scrollbar{

    width:10px;

}

::-webkit-scrollbar-track{

    background:transparent;

}

::-webkit-scrollbar-thumb{

    background:#94a3b8;

    border-radius:20px;

}

::-webkit-scrollbar-thumb:hover{

    background:#64748b;

}


/* ==========================================================
   RESPONSIVE
   ========================================================== */

@media(max-width:900px){

#layout{

grid-template-columns:

70px

1fr;

}

.nav-item{

font-size:0;

position:relative;

}

.nav-item::before{

font-size:20px;

position:absolute;

left:24px;

}

}

</style>
