<script>
/* ==========================================================
 * TKR ENGINE V2
 * UI Framework v0.1 Alpha
 * Sprint UI-2 Part 2
 * ========================================================== */

(() => {

    "use strict";

    /* ======================================================
     * DOM
     * ====================================================== */

    const $ = (selector) => document.querySelector(selector);

    const $$ = (selector) => document.querySelectorAll(selector);

    const body = document.body;

    const sidebar = $("#sidebar");

    const workspace = $("#workspace");

    const themeButton = $("#btnTheme");

    const debugButton = $("#btnDebug");

    const navItems = $$(".nav-item");

    /* ======================================================
     * STORAGE
     * ====================================================== */

    const Storage = {

        get(key, fallback = null){

            try{

                if(typeof Engine !== "undefined" &&
                   Engine.storage){

                    return Engine.storage.get(key,fallback);

                }

                return JSON.parse(
                    localStorage.getItem(key)
                ) ?? fallback;

            }catch(e){

                return fallback;

            }

        },

        set(key,value){

            try{

                if(typeof Engine !== "undefined" &&
                   Engine.storage){

                    Engine.storage.set(key,value);

                    return;

                }

                localStorage.setItem(
                    key,
                    JSON.stringify(value)
                );

            }catch(e){

                console.warn(e);

            }

        }

    };

    /* ======================================================
     * THEME
     * ====================================================== */

    function loadTheme(){

        const theme = Storage.get(

            "engine.theme",

            "light"

        );

        body.classList.toggle(

            "dark",

            theme==="dark"

        );

        themeButton.innerHTML =

            theme==="dark"

            ? "☀️"

            : "🌙";

    }

    function toggleTheme(){

        const dark = body.classList.contains("dark");

        const next = dark

            ? "light"

            : "dark";

        Storage.set(

            "engine.theme",

            next

        );

        loadTheme();

    }

    /* ======================================================
     * SIDEBAR
     * ====================================================== */

    function setActiveMenu(button){

        navItems.forEach(item=>{

            item.classList.remove("active");

        });

        button.classList.add("active");

    }

    navItems.forEach(button=>{

        button.addEventListener(

            "click",

            ()=>{

                setActiveMenu(button);

            }

        );

    });

    /* ======================================================
     * DEBUG
     * ====================================================== */

    debugButton.addEventListener(

        "click",

        ()=>{

            alert(

                "Developer Console\n\nSprint berikutnya."

            );

        }

    );

    /* ======================================================
     * KEYBOARD SHORTCUT
     * ====================================================== */

    document.addEventListener(

        "keydown",

        e=>{

            if(

                e.ctrlKey &&

                e.shiftKey &&

                e.key.toLowerCase()==="d"

            ){

                e.preventDefault();

                debugButton.click();

            }

        }

    );

    /* ======================================================
     * THEME BUTTON
     * ====================================================== */

    themeButton.addEventListener(

        "click",

        toggleTheme

    );

    /* ======================================================
     * ENGINE READY
     * ====================================================== */

    loadTheme();

    console.log(

        "%cTKR Engine V2",

        "color:#2563eb;font-size:18px;font-weight:bold"

    );

    console.log(

        "UI Framework Loaded"

    );

})();
</script>
